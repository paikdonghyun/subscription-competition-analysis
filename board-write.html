<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글쓰기 · 청약랩</title>
<link rel="stylesheet" href="/css/common.css">
</head>
<body>
<nav class="gnav"><div class="gnav-inner">
  <a href="/" class="gnav-logo"><span class="gnav-logo-kr">청약랩</span><span class="gnav-logo-en">ApplyLab</span></a>
  <div class="gnav-divider"></div>
  <div class="gnav-menu">
    <a href="/" class="gnav-item">청약 분석</a>
    <a href="/board.html" class="gnav-item">게시판</a>
  </div>
  <div class="gnav-right" id="gnav-right"></div>
</div></nav>

<div style="max-width:780px;margin:2rem auto;padding:0 1.5rem">
  <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem">
    <a href="/board.html" style="color:var(--ink3);font-size:13px">← 게시판</a>
    <span style="color:var(--bg3)">/</span>
    <span style="font-family:var(--serif);font-size:1rem;font-weight:600">글쓰기</span>
  </div>

  <div class="card">
    <div id="write-alert" style="display:none" class="alert"></div>
    <div class="form-group">
      <label class="form-label">분류</label>
      <select class="form-input" id="post-cat" style="max-width:200px">
        <option value="analysis">📊 시장분석</option>
        <option value="info">📋 분양정보</option>
        <option value="strategy">💡 청약전략</option>
        <option value="qna">❓ 질문</option>
        <option value="free" selected>💬 자유</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">제목</label>
      <input class="form-input" type="text" id="post-title" placeholder="제목을 입력하세요" maxlength="100">
    </div>
    <div class="form-group">
      <label class="form-label">내용</label>
      <textarea class="form-input" id="post-content" rows="14" placeholder="내용을 입력하세요..." style="resize:vertical;line-height:1.7"></textarea>
    </div>
    <div style="display:flex;gap:.5rem;justify-content:flex-end">
      <a href="/board.html" class="btn btn-secondary">취소</a>
      <button class="btn btn-primary" onclick="submitPost()" id="submit-btn">등록하기</button>
    </div>
  </div>
</div>

<script src="/js/firebase-config.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);
let currentUser = null, userDoc = null;

onAuthStateChanged(auth, async u => {
  if(!u){ location.href='/login.html?from=/board-write.html'; return; }
  currentUser = u;
  const snap = await getDoc(doc(db,'users',u.uid));
  userDoc = snap.data();
  const right = document.getElementById('gnav-right');
  if(right) right.innerHTML = `<span style="font-size:13px;color:var(--ink2)">${userDoc?.displayName||u.email}</span>`;
});

window.submitPost = async () => {
  const cat     = document.getElementById('post-cat').value;
  const title   = document.getElementById('post-title').value.trim();
  const content = document.getElementById('post-content').value.trim();
  const alert   = document.getElementById('write-alert');
  if(!title) { alert.className='alert alert-danger'; alert.textContent='제목을 입력해주세요.'; alert.style.display='block'; return; }
  if(content.length < 10) { alert.className='alert alert-danger'; alert.textContent='내용을 10자 이상 입력해주세요.'; alert.style.display='block'; return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled=true; btn.textContent='등록 중...';
  try {
    const ref = await addDoc(collection(db,'board'),{
      category:cat, title, content,
      authorId:currentUser.uid, authorName:userDoc?.displayName||currentUser.email,
      createdAt:serverTimestamp(), updatedAt:serverTimestamp(),
      views:0, commentCount:0, status:'active'
    });
    location.href = '/board-post.html?id='+ref.id;
  } catch(e) {
    alert.className='alert alert-danger'; alert.textContent='등록에 실패했습니다: '+e.message; alert.style.display='block';
    btn.disabled=false; btn.textContent='등록하기';
  }
};
</script>
</body>
</html>
