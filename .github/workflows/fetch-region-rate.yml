name: 지역별 최근 1년 청약률 수집

on:
  schedule:
    - cron: '40 15 * * *'   # 00:40 KST (단지목록 수집 직후)
  workflow_dispatch:

jobs:
  fetch-region-rate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 지역별 청약률 수집
        env:
          API_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: python3 scripts/fetch_region_rate.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/region_rate/
          git diff --staged --quiet || git commit -m "지역별 청약률 자동수집 $(date +'%Y-%m-%d %H:%M') KST"
          git push
