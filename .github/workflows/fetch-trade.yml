name: 실거래가 데이터 수집

on:
  schedule:
    # 매일 새벽 3시 (KST) = UTC 18:00 전날
    - cron: '0 18 * * *'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  fetch-trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 실거래가 데이터 수집
        env:
          API_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: |
          python3 scripts/fetch_trade.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trade/
          git diff --staged --quiet || git commit -m "자동 수집: 실거래가 데이터 $(date +'%Y-%m-%d')"
          git push
