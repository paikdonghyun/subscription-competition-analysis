name: 단지 목록 수집

on:
  schedule:
    - cron: '0 15 * * *'   # 00:00 KST (UTC+9 → UTC 15:00)
    - cron: '0 3 * * *'    # 12:00 KST (UTC+9 → UTC 03:00)
  workflow_dispatch:         # 수동 실행

jobs:
  fetch-apt-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 단지 목록 수집
        env:
          API_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: python3 scripts/fetch_apt_list.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/apt/
          git diff --staged --quiet || git commit -m "단지목록 자동수집 $(date +'%Y-%m-%d %H:%M') KST"
          git push
