<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게시판 · 청약랩</title>
<link rel="stylesheet" href="/css/common.css">
<style>
.board-hero{background:linear-gradient(135deg,var(--accent) 0%,#1e40af 100%);color:#fff;padding:2rem 0;margin-bottom:1.5rem}
.board-hero-inner{max-width:860px;margin:0 auto;padding:0 1.5rem}
.board-hero h1{font-family:var(--serif);font-size:1.5rem;font-weight:600;margin-bottom:.25rem}
.board-hero p{font-size:13px;opacity:.75;font-family:var(--mono)}
.board-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.board-search{display:flex;gap:0;max-width:300px}
.board-search input{flex:1;background:var(--bg);border:1.5px solid var(--bg3);border-right:none;color:var(--ink);padding:.45rem .75rem;border-radius:var(--r) 0 0 var(--r);font-size:13px;outline:none}
.board-search input:focus{border-color:var(--accent);background:var(--white)}
.board-search button{background:var(--accent);color:#fff;border:none;padding:.45rem .875rem;border-radius:0 var(--r) var(--r) 0;font-size:12px;cursor:pointer}
.cat-tabs{display:flex;gap:.25rem;flex-wrap:wrap}
.cat-tab{font-size:12px;padding:.35rem .75rem;border:1px solid var(--bg3);border-radius:20px;cursor:pointer;color:var(--ink3);background:var(--white);transition:all .12s}
.cat-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.post-row{display:grid;grid-template-columns:60px 1fr 100px 80px 60px;align-items:center;padding:.75rem 1rem;border-bottom:1px solid var(--bg2);transition:background .1s;cursor:pointer}
.post-row:hover{background:var(--accent-l)}
.post-row:last-child{border-bottom:none}
.post-cat{font-size:10px;font-family:var(--mono)}
.post-title{font-size:13px;color:var(--ink);font-weight:400;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.post-title:hover{color:var(--accent)}
.post-meta{font-size:11px;color:var(--ink4);font-family:var(--mono);text-align:right}
.post-author{font-size:11px;color:var(--ink3)}
.post-views{font-family:var(--mono);font-size:11px;color:var(--ink4);text-align:right}
.board-header{display:grid;grid-template-columns:60px 1fr 100px 80px 60px;padding:.5rem 1rem;border-bottom:2px solid var(--bg3);background:var(--bg);border-radius:var(--r-lg) var(--r-lg) 0 0}
.board-header span{font-family:var(--mono);font-size:9px;letter-spacing:.07em;color:var(--ink4);text-transform:uppercase}
</style>
</head>
<body>
<!-- 네비게이션 -->
<nav class="gnav">
  <div class="gnav-inner">
    <a href="/" class="gnav-logo"><span class="gnav-logo-kr">청약랩</span><span class="gnav-logo-en">ApplyLab</span></a>
    <div class="gnav-divider"></div>
    <div class="gnav-menu">
      <a href="/" class="gnav-item">청약 분석</a>
      <a href="/board.html" class="gnav-item active">게시판</a>
      <a href="/mypage.html" class="gnav-item">마이페이지</a>
    </div>
    <div class="gnav-right" id="gnav-right"></div>
  </div>
</nav>

<div class="board-hero">
  <div class="board-hero-inner">
    <h1>커뮤니티 게시판</h1>
    <p>분양 정보, 청약 전략, 시장 분석을 공유하세요</p>
  </div>
</div>

<div style="max-width:1400px;margin:0 auto;padding:0 1.5rem;display:grid;grid-template-columns:160px 1fr 160px;gap:0;align-items:start">
  <!-- 좌측 광고 -->
  <div class="ad-col"><div class="ad-side">
    <div class="ad-slot"><div class="ad-label">Ad</div>
      <div class="ad-160x600"><ins class="adsbygoogle" style="display:block;width:160px;height:600px" data-ad-client="ca-pub-XXXXXXXXXX" data-ad-slot="XXXXXXXXXX" data-ad-format="auto"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
    </div>
  </div></div>

  <!-- 메인 콘텐츠 -->
  <div style="padding:0 1.25rem;min-width:0">
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:1rem 1.25rem;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem">
        <div class="cat-tabs" id="cat-tabs">
          <button class="cat-tab active" onclick="filterCat('all')">전체</button>
          <button class="cat-tab" onclick="filterCat('analysis')">📊 시장분석</button>
          <button class="cat-tab" onclick="filterCat('info')">📋 분양정보</button>
          <button class="cat-tab" onclick="filterCat('strategy')">💡 청약전략</button>
          <button class="cat-tab" onclick="filterCat('qna')">❓ 질문</button>
          <button class="cat-tab" onclick="filterCat('free')">💬 자유</button>
        </div>
        <div style="display:flex;gap:.5rem;align-items:center">
          <div class="board-search">
            <input type="text" id="search-input" placeholder="제목 검색..." onkeydown="if(event.key==='Enter')searchPosts()">
            <button onclick="searchPosts()">검색</button>
          </div>
          <button class="btn btn-primary btn-sm" id="write-btn" onclick="goWrite()" style="display:none">✏ 글쓰기</button>
        </div>
      </div>

      <div class="board-header">
        <span>분류</span><span>제목</span><span style="text-align:right">작성자</span><span style="text-align:right">날짜</span><span style="text-align:right">조회</span>
      </div>
      <div id="post-list">
        <div class="loading-wrap"><div class="spinner"></div><p style="margin-top:.75rem">게시글 로딩 중...</p></div>
      </div>
      <div class="pager" id="pager" style="padding:1rem"></div>
    </div>

    <!-- 중간 광고 -->
    <div class="ad-slot" style="margin-top:1rem"><div class="ad-label">Advertisement</div>
      <div class="ad-728x90"><ins class="adsbygoogle" style="display:block;width:100%;height:90px" data-ad-client="ca-pub-XXXXXXXXXX" data-ad-slot="XXXXXXXXXX" data-ad-format="auto" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
    </div>
  </div>

  <!-- 우측 광고 -->
  <div class="ad-col"><div class="ad-side">
    <div class="ad-slot"><div class="ad-label">Ad</div>
      <div class="ad-160x600"><ins class="adsbygoogle" style="display:block;width:160px;height:600px" data-ad-client="ca-pub-XXXXXXXXXX" data-ad-slot="XXXXXXXXXX" data-ad-format="auto"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
    </div>
  </div></div>
</div>

<footer class="gfooter">청약랩 · ApplyLab · 데이터 출처: 한국부동산원</footer>

<script src="/js/firebase-config.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, query, orderBy, limit, startAfter,
         where, getDocs, getDoc, doc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);

const CATS = {all:'전체',analysis:'시장분석',info:'분양정보',strategy:'청약전략',qna:'질문',free:'자유'};
const CAT_COLORS = {analysis:'badge-blue',info:'badge-green',strategy:'badge-gold',qna:'badge-red',free:'badge-gray'};
const PAGE_SIZE = 20;
let currentCat = 'all', currentPage = 1, allPosts = [], filteredPosts = [];
let currentUser = null;

onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  renderNav(user);
  if(user) document.getElementById('write-btn').style.display = 'inline-flex';
  loadPosts();
});

async function renderNav(user) {
  const right = document.getElementById('gnav-right');
  if(!right) return;
  if(user) {
    const snap = await getDoc(doc(db,'users',user.uid));
    const name = snap.data()?.displayName || user.email.split('@')[0];
    const isAdmin = snap.data()?.role === 'admin';
    right.innerHTML = `<div class="gnav-dropdown">
      <div class="gnav-user" style="cursor:pointer;padding:.25rem .5rem;border-radius:var(--r);display:flex;align-items:center;gap:.5rem">
        <div class="gnav-avatar">${name[0].toUpperCase()}</div>
        <span style="font-size:12px">${name}</span>▾
      </div>
      <div class="gnav-dropdown-menu">
        <a class="gnav-dropdown-item" href="/mypage.html">마이페이지</a>
        ${isAdmin?'<a class="gnav-dropdown-item" href="/admin/" style="color:var(--red)">⚙ 관리자</a>':''}
        <a class="gnav-dropdown-item danger" href="#" onclick="signOut(getAuth());location.href='/';return false">로그아웃</a>
      </div>
    </div>`;
  } else {
    right.innerHTML = `<a href="/login.html" class="gnav-btn outline">로그인</a><a href="/login.html#register" class="gnav-btn solid">회원가입</a>`;
  }
}

async function loadPosts() {
  try {
    const q = query(collection(db,'board'), orderBy('createdAt','desc'), limit(200));
    const snap = await getDocs(q);
    allPosts = snap.docs.map(d => ({id:d.id, ...d.data()}))
      .filter(p => p.status !== 'deleted');
    filterAndRender();
  } catch(e) {
    document.getElementById('post-list').innerHTML = '<div style="padding:2rem;text-align:center;color:var(--ink4);font-size:13px">게시글을 불러오는 중 오류가 발생했습니다.</div>';
  }
}

window.filterCat = (cat) => {
  currentCat = cat; currentPage = 1;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  filterAndRender();
};
window.searchPosts = () => {
  currentPage = 1; filterAndRender();
};

function filterAndRender() {
  const kw = document.getElementById('search-input').value.trim().toLowerCase();
  filteredPosts = allPosts.filter(p => {
    const catOk = currentCat === 'all' || p.category === currentCat;
    const kwOk  = !kw || (p.title||'').toLowerCase().includes(kw) || (p.content||'').toLowerCase().includes(kw);
    return catOk && kwOk;
  });
  renderPosts();
  renderPager();
}

function renderPosts() {
  const start = (currentPage-1)*PAGE_SIZE;
  const page  = filteredPosts.slice(start, start+PAGE_SIZE);
  const list  = document.getElementById('post-list');
  if(!page.length) {
    list.innerHTML = '<div style="padding:3rem;text-align:center;color:var(--ink4);font-size:13px">게시글이 없습니다.</div>';
    return;
  }
  list.innerHTML = page.map(p => {
    const cat   = CATS[p.category] || p.category || '자유';
    const color = CAT_COLORS[p.category] || 'badge-gray';
    const date  = p.createdAt?.toDate ? p.createdAt.toDate().toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'}) : '—';
    return `<div class="post-row" onclick="location.href='/board-post.html?id=${p.id}'">
      <div><span class="badge ${color}">${cat}</span></div>
      <div class="post-title">${p.title||'(제목 없음)'} ${p.commentCount?`<span style="color:var(--accent);font-size:11px">[${p.commentCount}]</span>`:''}</div>
      <div class="post-meta">${p.authorName||'익명'}</div>
      <div class="post-meta">${date}</div>
      <div class="post-views">${(p.views||0).toLocaleString()}</div>
    </div>`;
  }).join('');
}

function renderPager() {
  const total = Math.ceil(filteredPosts.length/PAGE_SIZE);
  const pager = document.getElementById('pager');
  if(total <= 1){ pager.innerHTML=''; return; }
  let html = `<button class="pager-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>← 이전</button>`;
  const s = Math.max(1,currentPage-4), e = Math.min(total,currentPage+4);
  for(let p=s;p<=e;p++) html += `<button class="pager-num ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  html += `<button class="pager-btn" onclick="goPage(${currentPage+1})" ${currentPage>=total?'disabled':''}>다음 →</button>`;
  pager.innerHTML = html;
}
window.goPage = (p) => { currentPage=p; renderPosts(); renderPager(); window.scrollTo({top:0,behavior:'smooth'}); };
window.goWrite = () => {
  if(!currentUser){ location.href='/login.html?from='+encodeURIComponent(location.href); return; }
  location.href='/board-write.html';
};
</script>
</body>
</html>
