<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게시판 관리 · 청약랩</title>
<link rel="stylesheet" href="/css/common.css">
<style>body{background:#f1f5f9}.admin-wrap{display:flex;min-height:100vh}.admin-sidebar{width:220px;background:#1e293b;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}.admin-sidebar-logo{padding:1.25rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.08)}.admin-sidebar-logo-kr{font-family:var(--serif);font-size:1.1rem;color:#f1f5f9;font-weight:600}.admin-sidebar-logo-sub{font-family:var(--mono);font-size:9px;color:#64748b;letter-spacing:.08em;margin-top:2px}.admin-nav{padding:.75rem}.admin-nav-section{font-family:var(--mono);font-size:9px;color:#475569;letter-spacing:.1em;text-transform:uppercase;padding:.5rem .75rem .25rem;margin-top:.5rem}.admin-nav-item{display:flex;align-items:center;gap:.625rem;padding:.55rem .75rem;border-radius:var(--r);font-size:13px;color:#94a3b8;cursor:pointer;transition:all .12s;margin-bottom:2px;text-decoration:none}.admin-nav-item:hover{background:rgba(255,255,255,.06);color:#e2e8f0}.admin-nav-item.active{background:rgba(29,78,216,.25);color:#93c5fd}.admin-main{flex:1;padding:2rem;min-width:0}.admin-page-title{font-family:var(--serif);font-size:1.4rem;font-weight:600;color:#1e293b;margin-bottom:.2rem}.admin-page-sub{font-size:12px;color:#64748b;font-family:var(--mono);margin-bottom:1.5rem}</style>
</head>
<body>
<div class="admin-wrap">
<div class="admin-sidebar">
  <div class="admin-sidebar-logo"><div class="admin-sidebar-logo-kr">청약랩 관리자</div><div class="admin-sidebar-logo-sub">ApplyLab Admin</div></div>
  <div class="admin-nav">
    <div class="admin-nav-section">대시보드</div>
    <a href="/subscription-competition-analysis/admin/" class="admin-nav-item">📊 방문자 통계</a>
    <div class="admin-nav-section">관리</div>
    <a href="/subscription-competition-analysis/admin/members.html" class="admin-nav-item">👥 회원 관리</a>
    <a href="/subscription-competition-analysis/admin/board.html" class="admin-nav-item active">📋 게시판 관리</a>
    <a href="/subscription-competition-analysis/admin/accounts.html" class="admin-nav-item">🔑 관리자 계정</a>
    <a href="/subscription-competition-analysis/" class="admin-nav-item" style="margin-top:2rem">🏠 사이트로 이동</a>
    <a href="#" class="admin-nav-item" onclick="doLogout();return false" style="color:#ef4444">🚪 로그아웃</a>
  </div>
</div>
<div class="admin-main">
  <div class="admin-page-title">게시판 관리</div>
  <div class="admin-page-sub">게시글 검색, 숨김 처리, 삭제 등을 관리합니다</div>

  <div style="background:var(--white);border:1px solid #e2e8f0;border-radius:var(--r-lg);padding:1rem 1.25rem;margin-bottom:1rem;display:flex;gap:.75rem;flex-wrap:wrap;align-items:center">
    <input type="text" id="search-q" class="form-input" style="max-width:280px" placeholder="제목/작성자 검색">
    <select id="filter-cat" class="form-input" style="max-width:140px">
      <option value="">전체 분류</option>
      <option value="analysis">시장분석</option>
      <option value="info">분양정보</option>
      <option value="strategy">청약전략</option>
      <option value="qna">질문</option>
      <option value="free">자유</option>
    </select>
    <select id="filter-status" class="form-input" style="max-width:130px">
      <option value="">전체 상태</option>
      <option value="active">정상</option>
      <option value="deleted">삭제됨</option>
    </select>
    <button class="btn btn-primary btn-sm" onclick="filterPosts()">검색</button>
    <span style="font-family:var(--mono);font-size:12px;color:var(--ink3);margin-left:auto" id="result-count"></span>
  </div>

  <div style="background:var(--white);border:1px solid #e2e8f0;border-radius:var(--r-lg);overflow:hidden">
    <table class="tbl">
      <thead><tr><th>분류</th><th>제목</th><th>작성자</th><th>상태</th><th class="num">조회</th><th class="num">댓글</th><th class="num">작성일</th><th>관리</th></tr></thead>
      <tbody id="post-tbody"><tr><td colspan="8" style="text-align:center;padding:3rem;color:var(--ink4)"><div class="spinner" style="margin:0 auto 1rem"></div></td></tr></tbody>
    </table>
  </div>
  <div class="pager" id="pager" style="margin-top:1rem"></div>
</div>
</div>

<script src="../js/firebase-config.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, deleteDoc,
         orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp(FIREBASE_CONFIG), auth=getAuth(app), db=getFirestore(app);
const CATS={analysis:'시장분석',info:'분양정보',strategy:'청약전략',qna:'질문',free:'자유'};
const CAT_COLORS={analysis:'badge-blue',info:'badge-green',strategy:'badge-gold',qna:'badge-red',free:'badge-gray'};
const PAGE=20;
let all=[], filtered=[], currentPage=1;

onAuthStateChanged(auth, async u => {
  if(!u){location.href='/subscription-competition-analysis/login.html';return;}
  const snap=await getDoc(doc(db,'users',u.uid));
  if(snap.data()?.role!=='admin'){alert('관리자만 접근 가능합니다.');location.href='/subscription-competition-analysis/';return;}
  loadPosts();
});
window.doLogout=async()=>{await signOut(auth);location.href='/subscription-competition-analysis/';};

async function loadPosts() {
  const q=query(collection(db,'board'),orderBy('createdAt','desc'));
  const snap=await getDocs(q);
  all=snap.docs.map(d=>({id:d.id,...d.data()}));
  filterPosts();
}

window.filterPosts=()=>{
  const kw=document.getElementById('search-q').value.toLowerCase();
  const cat=document.getElementById('filter-cat').value;
  const status=document.getElementById('filter-status').value;
  filtered=all.filter(p=>{
    const kwOk=!kw||(p.title||'').toLowerCase().includes(kw)||(p.authorName||'').toLowerCase().includes(kw);
    const catOk=!cat||p.category===cat;
    const stOk=!status||p.status===status;
    return kwOk&&catOk&&stOk;
  });
  currentPage=1;
  document.getElementById('result-count').textContent=`${filtered.length}건`;
  render(); renderPager();
};

function render(){
  const page=filtered.slice((currentPage-1)*PAGE,currentPage*PAGE);
  const tbody=document.getElementById('post-tbody');
  if(!page.length){tbody.innerHTML='<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--ink4)">결과 없음</td></tr>';return;}
  tbody.innerHTML=page.map(p=>{
    const cat=CATS[p.category]||'기타';
    const clr=CAT_COLORS[p.category]||'badge-gray';
    const date=p.createdAt?.toDate().toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'})||'—';
    const isDeleted=p.status==='deleted';
    return `<tr style="${isDeleted?'opacity:.5':''}">
      <td><span class="badge ${clr}">${cat}</span></td>
      <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
        <a href="/board-post.html?id=${p.id}" target="_blank" style="color:var(--ink);font-size:13px">${p.title||'(제목없음)'}</a>
      </td>
      <td style="font-size:12px">${p.authorName||'—'}</td>
      <td>${isDeleted?'<span class="badge badge-red">삭제</span>':'<span class="badge badge-green">정상</span>'}</td>
      <td class="num">${(p.views||0).toLocaleString()}</td>
      <td class="num">${p.commentCount||0}</td>
      <td class="num" style="font-size:11px;font-family:var(--mono)">${date}</td>
      <td style="display:flex;gap:.25rem">
        ${!isDeleted?`<button class="btn btn-danger btn-sm" onclick="removePost('${p.id}')">삭제</button>`:`<button class="btn btn-secondary btn-sm" onclick="restorePost('${p.id}')">복원</button>`}
      </td>
    </tr>`;
  }).join('');
}

function renderPager(){
  const total=Math.ceil(filtered.length/PAGE);
  const pager=document.getElementById('pager');
  if(total<=1){pager.innerHTML='';return;}
  let html=`<button class="pager-btn" onclick="goP(${currentPage-1})" ${currentPage<=1?'disabled':''}>← 이전</button>`;
  for(let p=Math.max(1,currentPage-4);p<=Math.min(total,currentPage+4);p++)
    html+=`<button class="pager-num ${p===currentPage?'active':''}" onclick="goP(${p})">${p}</button>`;
  html+=`<button class="pager-btn" onclick="goP(${currentPage+1})" ${currentPage>=total?'disabled':''}>다음 →</button>`;
  pager.innerHTML=html;
}
window.goP=p=>{currentPage=p;render();renderPager();window.scrollTo({top:0,behavior:'smooth'});};

window.removePost=async(id)=>{
  if(!confirm('이 게시글을 삭제 처리하시겠습니까?')) return;
  await updateDoc(doc(db,'board',id),{status:'deleted'});
  const p=all.find(x=>x.id===id); if(p) p.status='deleted';
  render();
};
window.restorePost=async(id)=>{
  await updateDoc(doc(db,'board',id),{status:'active'});
  const p=all.find(x=>x.id===id); if(p) p.status='active';
  render();
};
</script>
</body>
</html>
