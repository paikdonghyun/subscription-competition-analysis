<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원 관리 · 청약랩</title>
<link rel="stylesheet" href="/subscription-competition-analysis/css/common.css">
<style>body{background:#f1f5f9}.admin-wrap{display:flex;min-height:100vh}.admin-sidebar{width:220px;background:#1e293b;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}.admin-sidebar-logo{padding:1.25rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.08)}.admin-sidebar-logo-kr{font-family:var(--serif);font-size:1.1rem;color:#f1f5f9;font-weight:600}.admin-sidebar-logo-sub{font-family:var(--mono);font-size:9px;color:#64748b;letter-spacing:.08em;margin-top:2px}.admin-nav{padding:.75rem}.admin-nav-section{font-family:var(--mono);font-size:9px;color:#475569;letter-spacing:.1em;text-transform:uppercase;padding:.5rem .75rem .25rem;margin-top:.5rem}.admin-nav-item{display:flex;align-items:center;gap:.625rem;padding:.55rem .75rem;border-radius:var(--r);font-size:13px;color:#94a3b8;cursor:pointer;transition:all .12s;margin-bottom:2px;text-decoration:none}.admin-nav-item:hover{background:rgba(255,255,255,.06);color:#e2e8f0}.admin-nav-item.active{background:rgba(29,78,216,.25);color:#93c5fd}.admin-main{flex:1;padding:2rem;min-width:0}.admin-page-title{font-family:var(--serif);font-size:1.4rem;font-weight:600;color:#1e293b;margin-bottom:.2rem}.admin-page-sub{font-size:12px;color:#64748b;font-family:var(--mono);margin-bottom:1.5rem}</style>
</head>
<body>
<div class="admin-wrap">
<div class="admin-sidebar">
  <div class="admin-sidebar-logo"><div class="admin-sidebar-logo-kr">청약랩 관리자</div><div class="admin-sidebar-logo-sub">ApplyLab Admin</div></div>
  <div class="admin-nav">
    <div class="admin-nav-section">대시보드</div>
    <a href="/subscription-competition-analysis/admin/" class="admin-nav-item">📊 방문자 통계</a>
    <div class="admin-nav-section">관리</div>
    <a href="/subscription-competition-analysis/admin/members.html" class="admin-nav-item active">👥 회원 관리</a>
    <a href="/subscription-competition-analysis/admin/board.html" class="admin-nav-item">📋 게시판 관리</a>
    <a href="/subscription-competition-analysis/admin/inquiries.html" class="admin-nav-item">💬 문의·수정요청</a>
    <a href="/subscription-competition-analysis/admin/accounts.html" class="admin-nav-item">🔑 관리자 계정</a>
    <a href="/subscription-competition-analysis/" class="admin-nav-item" style="margin-top:2rem">🏠 사이트로 이동</a>
    <a href="#" class="admin-nav-item" onclick="doLogout();return false" style="color:#ef4444">🚪 로그아웃</a>
  </div>
</div>
<div class="admin-main">
  <div class="admin-page-title">회원 관리</div>
  <div class="admin-page-sub" id="member-count">로딩 중...</div>

  <!-- 검색 필터 -->
  <div style="background:var(--white);border:1px solid #e2e8f0;border-radius:var(--r-lg);padding:1rem 1.25rem;margin-bottom:1rem;display:flex;gap:.75rem;flex-wrap:wrap;align-items:center">
    <input type="text" id="search-q" class="form-input" style="max-width:240px" placeholder="이름/이메일 검색">
    <select id="filter-role" class="form-input" style="max-width:130px">
      <option value="">전체 권한</option>
      <option value="user">일반회원</option>
      <option value="admin">관리자</option>
    </select>
    <select id="filter-status" class="form-input" style="max-width:130px">
      <option value="">전체 상태</option>
      <option value="active">정상</option>
      <option value="banned">정지</option>
    </select>
    <button class="btn btn-primary btn-sm" onclick="filterMembers()">검색</button>
    <button class="btn btn-secondary btn-sm" onclick="resetFilter()">초기화</button>
    <span style="font-size:12px;color:var(--ink3);font-family:var(--mono);margin-left:auto" id="filter-result"></span>
  </div>

  <div style="background:var(--white);border:1px solid #e2e8f0;border-radius:var(--r-lg);overflow:hidden">
    <table class="tbl" id="member-tbl">
      <thead><tr>
        <th>이름</th><th>이메일</th><th>권한</th><th>상태</th>
        <th class="num">가입일</th><th class="num">최근 로그인</th><th>관리</th>
      </tr></thead>
      <tbody id="member-tbody"><tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--ink4)"><div class="spinner" style="margin:0 auto 1rem"></div>로딩 중...</td></tr></tbody>
    </table>
  </div>
  <div class="pager" id="pager" style="margin-top:1rem"></div>
</div>
</div>

<!-- 회원 상세 모달 -->
<div class="modal-overlay" id="member-modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">회원 정보</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script src="../js/firebase-config.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc,
         updateDoc, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);
const PAGE = 20;
let allMembers = [], filtered = [], currentPage = 1, me = null;

onAuthStateChanged(auth, async u => {
  if(!u){ location.href='/subscription-competition-analysis/login.html'; return; }
  const snap = await getDoc(doc(db,'users',u.uid));
  const ud = snap.data();
  if(ud?.role !== 'admin'){ alert('관리자만 접근 가능합니다.'); location.href='/subscription-competition-analysis/'; return; }
  me = ud; me.uid = u.uid;
  loadMembers();
});

window.doLogout = async () => { await signOut(auth); location.href='/subscription-competition-analysis/'; };

async function loadMembers() {
  const q = query(collection(db,'users'), orderBy('createdAt','desc'));
  const snap = await getDocs(q);
  allMembers = snap.docs.map(d=>({id:d.id,...d.data()}));
  document.getElementById('member-count').textContent = `전체 ${allMembers.length}명`;
  filterMembers();
}

window.filterMembers = () => {
  const kw     = document.getElementById('search-q').value.toLowerCase();
  const role   = document.getElementById('filter-role').value;
  const status = document.getElementById('filter-status').value;
  filtered = allMembers.filter(m => {
    const kwOk = !kw || (m.displayName||'').toLowerCase().includes(kw) || (m.email||'').toLowerCase().includes(kw);
    const roleOk   = !role   || m.role   === role;
    const statusOk = !status || m.status === status;
    return kwOk && roleOk && statusOk;
  });
  currentPage = 1;
  document.getElementById('filter-result').textContent = `${filtered.length}명 검색됨`;
  renderTable();
  renderPager();
};

window.resetFilter = () => {
  document.getElementById('search-q').value='';
  document.getElementById('filter-role').value='';
  document.getElementById('filter-status').value='';
  filterMembers();
};

function renderTable() {
  const page = filtered.slice((currentPage-1)*PAGE, currentPage*PAGE);
  const tbody = document.getElementById('member-tbody');
  if(!page.length){ tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--ink4)">검색 결과가 없습니다.</td></tr>'; return; }
  tbody.innerHTML = page.map(m => {
    const joinDate = m.createdAt?.toDate().toLocaleDateString('ko-KR')||'—';
    const lastDate = m.lastLoginAt?.toDate().toLocaleDateString('ko-KR')||'—';
    const roleBadge = m.role==='admin'?'<span class="badge badge-red">관리자</span>':'<span class="badge badge-gray">일반</span>';
    const statusBadge = m.status==='banned'?'<span class="badge badge-red">정지</span>':'<span class="badge badge-green">정상</span>';
    return `<tr>
      <td style="font-weight:500">${m.displayName||'—'}</td>
      <td style="font-family:var(--mono);font-size:12px">${m.email||'—'}</td>
      <td>${roleBadge}</td><td>${statusBadge}</td>
      <td class="num">${joinDate}</td><td class="num">${lastDate}</td>
      <td><button class="btn btn-secondary btn-sm" onclick="openModal('${m.id}')">상세</button></td>
    </tr>`;
  }).join('');
}

function renderPager() {
  const total = Math.ceil(filtered.length/PAGE);
  const pager = document.getElementById('pager');
  if(total<=1){pager.innerHTML='';return;}
  let html = `<button class="pager-btn" onclick="goP(${currentPage-1})" ${currentPage<=1?'disabled':''}>← 이전</button>`;
  for(let p=Math.max(1,currentPage-4);p<=Math.min(total,currentPage+4);p++)
    html+=`<button class="pager-num ${p===currentPage?'active':''}" onclick="goP(${p})">${p}</button>`;
  html+=`<button class="pager-btn" onclick="goP(${currentPage+1})" ${currentPage>=total?'disabled':''}>다음 →</button>`;
  pager.innerHTML=html;
}
window.goP = p => { currentPage=p; renderTable(); renderPager(); window.scrollTo({top:0,behavior:'smooth'}); };

window.openModal = async (uid) => {
  const m = allMembers.find(x=>x.id===uid);
  if(!m) return;
  const joinDate = m.createdAt?.toDate().toLocaleString('ko-KR')||'—';
  const lastDate = m.lastLoginAt?.toDate().toLocaleString('ko-KR')||'—';
  document.getElementById('modal-body').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;font-size:13px">
      <div><p class="form-label">이름</p><p>${m.displayName||'—'}</p></div>
      <div><p class="form-label">이메일</p><p style="font-family:var(--mono)">${m.email||'—'}</p></div>
      <div><p class="form-label">권한</p><p>${m.role==='admin'?'관리자':'일반회원'}</p></div>
      <div><p class="form-label">상태</p><p>${m.status==='banned'?'정지':'정상'}</p></div>
      <div><p class="form-label">가입일</p><p>${joinDate}</p></div>
      <div><p class="form-label">최근 로그인</p><p>${lastDate}</p></div>
      <div style="grid-column:1/-1"><p class="form-label">UID</p><p style="font-family:var(--mono);font-size:11px;color:var(--ink3)">${uid}</p></div>
    </div>`;
  const isSelf = uid === me?.uid;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">닫기</button>
    ${!isSelf && m.role!=='admin' ? `<button class="btn btn-primary btn-sm" onclick="changeRole('${uid}','admin')">관리자 권한 부여</button>` : ''}
    ${!isSelf && m.role==='admin' ? `<button class="btn btn-secondary btn-sm" onclick="changeRole('${uid}','user')">일반으로 변경</button>` : ''}
    ${!isSelf && m.status!=='banned' ? `<button class="btn btn-danger btn-sm" onclick="changeStat('${uid}','banned')">계정 정지</button>` : ''}
    ${!isSelf && m.status==='banned' ? `<button class="btn btn-primary btn-sm" onclick="changeStat('${uid}','active')">정지 해제</button>` : ''}`;
  document.getElementById('member-modal').style.display='flex';
};
window.closeModal = () => document.getElementById('member-modal').style.display='none';

window.changeRole = async (uid, role) => {
  if(!confirm(`권한을 '${role==='admin'?'관리자':'일반회원'}'(으)로 변경하시겠습니까?`)) return;
  await updateDoc(doc(db,'users',uid),{role});
  const m = allMembers.find(x=>x.id===uid); if(m) m.role=role;
  closeModal(); renderTable();
};
window.changeStat = async (uid, status) => {
  if(!confirm(`계정을 '${status==='banned'?'정지':'활성화'}'하시겠습니까?`)) return;
  await updateDoc(doc(db,'users',uid),{status});
  const m = allMembers.find(x=>x.id===uid); if(m) m.status=status;
  closeModal(); renderTable();
};
</script>
</body>
</html>
